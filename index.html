<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoria.Local | O Arquivo da Nossa Comunidade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 400px; border-radius: 1.5rem; z-index: 1; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-stone-100 text-stone-900 font-serif">

    <header class="p-6 text-center">
        <h1 class="text-4xl font-black text-amber-900 tracking-tighter">MEMORIA.<span class="text-amber-600">LOCAL</span></h1>
        <p class="text-stone-500 mt-2 italic font-sans italic">"Se as ruas falassem, o que elas diriam?"</p>
    </header>

    <main class="container mx-auto px-4 max-w-5xl">
        <div class="bg-white p-2 rounded-[2rem] shadow-2xl mb-8">
            <div id="map"></div>
        </div>

        <div class="flex flex-col md:flex-row gap-8">
            <section class="w-full md:w-1/3 bg-white p-8 rounded-3xl shadow-lg h-fit">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                    <i class="fas fa-feather-alt text-amber-600"></i> Registrar Memória
                </h2>
                <form id="form-memoria" class="space-y-4 font-sans">
                    <input type="text" id="mem-titulo" placeholder="Título da História" class="w-full border-b-2 p-2 outline-none focus:border-amber-600 transition">
                    <textarea id="mem-relato" placeholder="Conte o que aconteceu aqui há 10, 20, 50 anos..." class="w-full border-b-2 p-2 h-32 outline-none focus:border-amber-600 resize-none"></textarea>
                    <input type="text" id="mem-autor" placeholder="Seu nome (ou 'Anônimo')" class="w-full border-b-2 p-2 outline-none focus:border-amber-600">
                    
                    <p class="text-xs text-stone-400 italic">Clique no mapa para marcar o local antes de salvar.</p>
                    <button type="submit" class="w-full bg-amber-800 text-white p-4 rounded-xl font-bold hover:bg-amber-900 transition shadow-lg shadow-amber-200">
                        ETERNIZAR MEMÓRIA
                    </button>
                </form>
            </section>

            <section class="w-full md:w-2/3">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2 px-4">
                    <i class="fas fa-history text-amber-600"></i> Relatos Recentes
                </h2>
                <div id="feed-memorias" class="space-y-6">
                    </div>
            </section>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
